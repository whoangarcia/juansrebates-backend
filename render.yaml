# Render blueprint for juansrebates.com backend.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: juansrebates-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHEET_ID
        value: 1ulM7OyW1eTkxErfqbmCHQaWYDYthk9FyGW4pHb-Na_k
      - key: ALLOWED_ORIGINS
        value: https://juansrebates.com,https://www.juansrebates.com,https://juansrebates.netlify.app
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false   # must be set manually in Render dashboard (it's a secret)
    healthCheckPath: /api/health
    autoDeploy: true
